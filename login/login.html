<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocCare - Login/Signup</title>
  <link rel="stylesheet" href="../login/login.css">
  <script src="/js/auth-service.js"></script>
</head>
<body>
    <header>
        <div class="top-bar">
          <!-- Contact Information -->
          <div class="contact-info">
            <span>📞 0731-123456</span> <!-- Phone number -->
            <span><a href="mailto:skinfluence@gmail.com">✉️ skinfluence@gmail.com</a></span> <!-- Email -->
            <span>🕐 12 am to 8 pm</span> <!-- Working hours -->
          </div>
          <!-- Social Media Icons -->
          <div class="social-icons">
            <a href="https://www.facebook.com" target="_blank" aria-label="Facebook">
              <img src="facebook.png" alt="Facebook"> <!-- Facebook Icon -->
            </a>
            <a href="https://www.instagram.com" target="_blank" aria-label="Instagram">
              <img src="instagram.png" alt="Instagram"> <!-- Instagram Icon -->
            </a>
            <a href="https://www.whatsapp.com" target="_blank" aria-label="WhatsApp">
              <img src="whatsapp.png" alt="WhatsApp"> <!-- WhatsApp Icon -->
            </a>
            <a href="https://www.youtube.com" target="_blank" aria-label="YouTube">
              <img src="youtube.png" alt="YouTube"> <!-- YouTube Icon -->
            </a>
          </div>
        </div>
      </header>

  <!-- Navigation Bar -->
  <nav>
    <!-- Logo Section -->
    <div class="logo">
      <a href="../Homepage/index.html"><img src="skinfluence_logo-removebg-preview.png" alt="Skinfluence Logo"></a>
    </div>
    <!-- Navigation Links -->
    <ul>
      <li><a href="../about dr/about dr.html">About Us</a></li>
      <!-- <li><a href="../bookings/bookings.html">Bookings</a></li> -->
      <li><a href="../Homepage/index.html#features">Explore</a></li>
      <li><a href="../contactus/contactus.html">Contact Us</a></li>
    </ul>
    
    <!-- Authentication & Profile Section -->
    <div class="auth">
      <a href="../login/login.html" class="login">Login</a>
      <a href="../login/login.html" class="login">Signup</a>
      <div class="profile-container">
        <img src="profile icon.png" alt="Profile Icon" id="profileIcon">
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="../myacc.html">My Account</a>
          <a href="../appointments/my-appointments.html">My Appointments</a>
          <a href="../contactus/contactus.html">Help</a>
          <a href="#" id="logoutBtn">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Centered page content below the nav -->
  <div class="page-content">
    <div class="main-container">
      <div class="content-wrapper">
        <div class="image-section">
          <img src="login.jpg" alt="Medical illustration" width="100">
        </div>
        <div class="form-container">
          <div class="login-container">
            <div class="form-section">
              <div class="form-header">
                <h1>Skinfluence</h1>
                <p>Your Skin, Our Priority</p>
              </div>
              <div class="toggle-forms">
                <button class="toggle-btn active" onclick="toggleForm('login')">Login</button>
                <button class="toggle-btn" onclick="toggleForm('signup')">Sign Up</button>
              </div>

              <div id="alert-message" class="alert-message"></div>

              <!-- LOGIN FORM -->
              <form id="login-form">
                <div class="input-group">
                  <label for="login-email">Email</label>
                  <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                  <label for="login-password">Password</label>
                  <div style="position: relative;">
                    <input type="password" id="login-password" required>
                    <span class="toggle-password" onclick="togglePassword('login-password', this)">
                      👁️
                    </span>
                  </div>
                </div>
                
                <button type="submit" class="submit-btn">Login</button>

                <div class="social-login">
                  <p>Or continue with</p>
                  <div class="social-buttons">
                    <button type="button" class="social-btn" onclick="loginWithGoogle()">
                      <img src="google login.svg" alt="Sign in with Google"/>
                    </button>
                    <button type="button" class="social-btn" onclick="loginWithFacebook()">
                      <img src="fb1.png" alt="Sign in with Facebook" />
                    </button>
                  </div>
                </div>
              </form>

              <!-- SIGNUP FORM -->
              <form id="signup-form">
                <div class="input-group">
                  <label for="signup-name">Full Name</label>
                  <input type="text" id="signup-name" required>
                </div>
                <div class="input-group">
                  <label for="signup-email">Email</label>
                  <input type="email" id="signup-email" required>
                </div>
                <div class="input-group">
                  <label for="signup-password">Password</label>
                  <div style="position: relative;">
                    <input type="password" id="signup-password" required>
                    <span class="toggle-password" onclick="togglePassword('signup-password', this)">
                      👁️
                    </span>
                  </div>
                </div>
                
                <div class="input-group">
                  <label for="signup-confirm">Confirm Password</label>
                  <div style="position: relative;">
                    <input type="password" id="signup-confirm" required>
                    <span class="toggle-password" onclick="togglePassword('signup-confirm', this)">
                      👁️
                    </span>
                  </div>
                </div>
                
                <button type="submit" class="submit-btn">Sign Up</button>
              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-links">
      <a href="../privacy-policy.html">Privacy Policy</a>
      <a href="../terms-and-conditions.html">Terms &amp; Conditions</a>
      <a href="../contactus/contactus.html">Contact Us</a>
      <a href="../about dr/about dr.html">About Us</a>
    </div>
  </footer>

  <script src='login.js'></script>

</body>
</html>
